<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>
<body>
    <pre> Rock paper Scissor </pre>
    <button id="b1" onclick="
       pg('rock')
    "> Rock </button>



    <Button id="b2"
      onclick="
       pg('paper')
    ">
     Paper</Button>


    
    <button id="b3" onclick="
        pg('scissor') 
    "> Scissors </button>

    <script>

        const score ={
            wins: 0,
            losses: 0,
            ties:0
        };



       


        function pg(playermove){
            const cm = pick_cm();

            let result = '';
            
            if (playermove === 'scissor'){
                if (cm === 'rock'  ){
                    result = 'you lose';
                } else if (cm === 'paper'){
                    result = 'you win';
                } else if(cm === 'scissor'){
                    result = 'tie';
                }
            
            } else if(playermove === 'paper'){
                
                    if (cm === 'rock'  ){   
                        result = 'you win';
                    } else if (cm === 'paper'){
                        result = 'tie';
                    } else if(cm === 'scissor'){
                        result = 'you lose';
                    }
                    
            } else if (playermove === 'rock'){
                if (cm === 'rock'  ){
                    result = 'tie';
                } else if (cm === 'paper'){
                    result = 'you lose';
                } else if(cm === 'scissor'){
                    result = 'you win';
                }
            }

            if (result === 'you win'){
                score.wins += 1;
            } else if(result === 'you lose'){
                score.losses += 1;
            } else if(result === 'tie'){
                score.ties += 1 ;
            }

            alert(`you picked ${playermove} . computer picked ${cm}.  ${result}.
            wins : ${score.wins},losses:${score.losses}, ties: ${score.ties}.
            ` );
        }
    



         function pick_cm() {
            let cm = '';
            const rn = Math.random();
            if(rn >= 0 && rn < 1/3){
                cm = 'rock';
            } else if(rn >= 1/3 && rn < 2/3 ){
                cm = 'paper';
            } else if (rn >= 2/3 && rn < 1){
                cm = 'scissor';
            }
            console.log(cm);

            return cm;
        }
        




    </script>
</body>
