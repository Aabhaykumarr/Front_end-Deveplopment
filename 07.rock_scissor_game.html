    <Button id="b2"

     Paper</Button>


    
    <button id="b3" onclick="
        pg('scissor') 
    "> Scissors </button>

    <script>
        function pick_cm() {
            let cm = '';
            const rn = Math.random();
            if(rn >= 0 && rn < 1/3){
                cm = 'rock';
            } else if(rn >= 1/3 && rn < 2/3 ){
                cm = 'paper';
            } else if (rn >= 2/3 && rn < 1){
                cm = 'scissor';
            }
            console.log(cm);

            return cm;
        }
        


        function pg(playermove){
            const cm = pick_cm();
            let result = '';
            if (playermove === 'scissor'){
                if (cm === 'rock'  ){
                    result = 'you lose';
                } else if (cm === 'paper'){
                    result = 'you win';
                } else if(cm === 'scissor'){
                    result = 'tie';
                }
                alert(`you picked scissor . computer picked ${cm}.  ${result}.` );
            }
        }
    
    </script>
