<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon.com - Father's Day Gifts</title>
    <link rel="stylesheet" href="ai_studio_code.css">
    <!-- Font Awesome is used to display icons (location pin, search, hamburger menu, arrows) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <!-- Top Navigation Bar -->
        <div class="nav-top">
            <div class="nav-left">

                    <svg class="amazon-logo" viewBox="0 0 100 30" width="100">

                        <path fill="#f08804" d="M12.5 27.2c3.5 1.8 8.1 2.8 12.8 2.8 5.7 0 11-1.5 14.8-4l.5-.3-.4-.5-.5-.1c-1 .2-2.1.4-3.2.4-3.8 0-7.7-1.1-11.2-2.9l-.6-.3-.3.5c-.7 1.1-1.4 2.1-2.1 2.9l1 .5-.2.1zm27-.8c.2-.2.2-.5 0-.7l-.8-.8c-.1-.1-.3-.2-.5-.1l-1.9.7c-.2.1-.3.3-.2.5l.4 1.2c.1.2.3.3.5.2l1.9-.7c.2-.1.3-.2.2-.4l-.2.1z"/>
                    </svg>
                </a>
                
                <div class="nav-delivery">
                    <i class="fa-solid fa-location-dot location-icon"></i>
                    <div class="delivery-text">
                        <span class="delivery-to">Deliver to</span>
                        <span class="delivery-country">India</span>
                    </div>
                </div>
            </div>

            <!-- Search Bar -->
            <div class="nav-search">
                <div class="search-category">
                    <span>Father's Day</span>
                    <i class="fa-solid fa-caret-down dropdown-arrow"></i>
                </div>
                <input type="text" class="search-input" placeholder="Search Amazon">
                <button class="search-button">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>

            <div class="nav-right-placeholder">
                <!-- Spacing helper to match the layout balance -->
            </div>
        </div>

        <!-- Bottom Navigation Bar -->
        <nav class="nav-bottom">
            <ul class="nav-links">
                <li><a href="#" class="all-menu"><i class="fa-solid fa-bars"></i> All</a></li>
                <li><a href="#">Today's Deals</a></li>
                <li><a href="#">Customer Service</a></li>
                <li><a href="#">Registry</a></li>
                <li><a href="#">Gift Cards</a></li>
                <li><a href="#">Sell</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Container -->
    <main class="container">
        <!-- Hero/Banner Section -->
        <section class="hero-banner">
            <div class="banner-content">
                <h1>Gifts for Dad at great prices</h1>
            </div>
        </section>

        <!-- Category Grid Section -->
        <section class="cards-grid">
            <!-- Card 1: Apparel -->
            <div class="category-card">
                <img src="https://images.unsplash.com/photo-1617137968427-85924c800a22?auto=format&fit=crop&w=600&q=80" alt="Apparel" class="card-img">
                <div class="card-label">Apparel</div>
            </div>

            <!-- Card 2: Shoes -->
            <div class="category-card">
                <img src="https://images.unsplash.com/photo-1460353581641-37baddab0fa2?auto=format&fit=crop&w=600&q=80" alt="Shoes" class="card-img">
                <div class="card-label">Shoes</div>
            </div>

            <!-- Card 3: Accessories -->
            <div class="category-card">
                <img src="https://images.unsplash.com/photo-1621184455862-c163dfb30e0f?auto=format&fit=crop&w=600&q=80" alt="Accessories" class="card-img">
                <div class="card-label">Accessories</div>
            </div>
        </section>
    </main>
</body>
</html>
